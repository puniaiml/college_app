name: shiksha_hub
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 1.0.0+1

environment:
  sdk: ^3.7.2

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  firebase_core: ^3.15.0
  firebase_auth: ^5.6.1
  cloud_firestore: ^5.6.10
  firebase_storage: ^12.4.8

  file_picker: ^10.2.0
  syncfusion_flutter_pdfviewer: ^30.1.38
  flutter_email_sender: ^7.0.0
  syncfusion_flutter_charts: ^30.1.40
  mailer: ^6.0.1
  google_sign_in: ^7.1.1

  get: ^4.6.6

  # image_cropper: ^8.0.2
  cached_network_image: ^3.4.1
  flutter_animated_button: ^2.0.3
  speech_to_text: 
  highlight_text: ^1.7.0
  avatar_glow: ^3.0.1
  google_fonts: ^6.1.0
  transparent_image: ^2.0.1
  flutter_riverpod: ^2.4.9
  salomon_bottom_bar: ^3.3.2
  animated_splash_screen: ^1.3.0
  lottie: ^3.1.2
  # webview_flutter: ^2.8.0 
  webview_flutter: ^4.4.2
  webview_flutter_android: ^4.7.0
  logger: ^2.5.0
  flutter_native_splash: ^2.4.1
  flutter_gemini: ^3.0.0
  image_picker: ^1.1.2
  dash_chat_2: ^0.0.21
  intl: ^0.19.0
  shared_preferences: ^2.0.11
  flutter_animate: ^4.5.2
  glassmorphism: ^3.0.0
  flutter_staggered_animations: 1.1.1
  syncfusion_flutter_core: ^30.1.40
  animated_text_kit: ^4.2.3
  shimmer: ^3.0.0
  get_storage: ^2.1.1
  flutter_svg: ^2.0.17
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  excel: ^4.0.6
  device_info_plus: ^11.5.0
  share_plus: ^12.0.1
  pdf: ^3.11.3
  printing: ^5.14.2
  flutter_notification_channel: ^3.1.1
  firebase_messaging: ^15.2.9
  googleapis_auth: ^1.6.0
  http: ^1.4.0
  url_launcher: ^6.1.10
  emoji_picker_flutter: ^4.3.0
  google_generative_ai: ^0.4.7
  mime: ^2.0.0
  open_file: ^3.2.1
  sqflite: ^2.4.1
  connectivity_plus: ^7.0.0
  app_links: 6.3.2
  crypto: ^3.0.7



dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  min_sdk_android: 21

  # Image 2 — clean shield logo for app icon
  image_path: "assets/icon/app_icon.png"

  # Android 8.0+ adaptive icon
  adaptive_icon_background: "#FFFFFF"        # white background suits the navy/gold logo
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png" 

  web:
    generate: true
    image_path: "assets/icon/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#1A3A6B"                   # navy blue from Image 2

  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 48

  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icon/splash_logo_padded_01.png
  android_gravity: center
  ios_content_mode: center
  fullscreen: true
  android_12:
    color: "#FFFFFF"
    image: assets/icon/splash_logo_padded_01.png
    icon_background_color: "#FFFFFF"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/calculator.png
    - assets/images/edit.png
    - assets/images/partners.png
    - assets/images/result.png
    - assets/images/study-time.png
    - assets/lottie/splash.json
    - assets/lottie/login.json
    - assets/lottie/register.json
    - assets/lottie/forgot.json
    - assets/lottie/email.json
    - assets/images/Shikshahub_logo.png
    - assets/images/user2.png
    - assets/images/pdf.png
    - assets/images/camera.png
    - assets/images/logo.png
    - assets/icon/splash_logo.png
    - assets/icon/splash_logo_padded.png
    - assets/icon/app_icon.png
    - assets/icon/app_icon_foreground.png
    - assets/icon/branding.png

    - assets/lottie/1.json
    - assets/lottie/2.json
    - assets/lottie/3.json
    - assets/lottie/4.json
    - assets/lottie/5.json
    - assets/lottie/ai_listening.json
    - assets/lottie/ai_nuetral.json
    - assets/lottie/loading.json
    - assets/lottie/empty.json
    - assets/lottie/Success.json
    - assets/lottie/blocked.json
    - assets/lottie/error.json
    - assets/lottie/ai.json

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto/Roboto-Bold.ttf
          weight: 700

    - family: Lobster
      fonts:
        - asset: assets/fonts/Lobster/Lobster-Regular.ttf

    - family: PT_Serif
      fonts:
        - asset: assets/fonts/PT_Serif/PTSerif-Regular.ttf

    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins/Poppins-Bold.ttf
          weight: 700

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
